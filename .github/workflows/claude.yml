name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_target:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  claude:
    name: Claude code review & assistant
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      github.event_name == 'pull_request_target'
    steps:
      - name: Run Claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          # For PR review, focus on Android/Kotlin best practices, security, and correctness
          custom_instructions: |
            You are reviewing an Android application written in Kotlin + Jetpack Compose.
            Focus on:
            - Kotlin idioms and Compose best practices
            - Security issues (this app handles sensitive operations)
            - Memory leaks, coroutine misuse, and lifecycle bugs
            - Correctness of cryptography (BouncyCastle is used)
            Keep responses concise and actionable.
