name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & sign release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout (full history for tag info)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION (tag: $TAG)"

      - name: Verify versionName matches tag
        run: |
          VN=$(grep -oP 'versionName = "\K[^"]+' app/build.gradle.kts)
          if [ "$VN" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::versionName in build.gradle.kts ('$VN') does not match git tag ('${{ steps.version.outputs.version }}')"
            exit 1
          fi
          echo "✓ versionName matches: $VN"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ZUPT_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Missing secret ZUPT_KEYSTORE_BASE64. See BUILD_REPRODUCIBLE.md for setup."
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > $HOME/zupt-release.keystore
          ls -la $HOME/zupt-release.keystore

      - name: Build signed release APK + AAB
        env:
          ZUPT_KEYSTORE: ${{ env.HOME }}/zupt-release.keystore
          ZUPT_KS_PASS: ${{ secrets.ZUPT_KS_PASS }}
          ZUPT_KS_ALIAS: ${{ secrets.ZUPT_KS_ALIAS }}
          ZUPT_KS_KEY_PASS: ${{ secrets.ZUPT_KS_KEY_PASS }}
        run: |
          ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Rename artifacts to versioned filenames
        run: |
          V="${{ steps.version.outputs.version }}"
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/*.apk release-artifacts/zupt-v${V}.apk
          cp app/build/outputs/bundle/release/*.aab release-artifacts/zupt-v${V}.aab
          ls -la release-artifacts/

      - name: Verify APK signature
        run: |
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -1)
          $APKSIGNER verify --verbose release-artifacts/zupt-v${{ steps.version.outputs.version }}.apk

      - name: Compute SHA-256 sums
        run: |
          cd release-artifacts
          sha256sum *.apk *.aab > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          V="${{ steps.version.outputs.version }}"
          # Pull section between "## [V]" and the next "## [" or EOF
          awk "/^## \[$V\]/,/^## \[/ { if (/^## \[/ && !/^## \[$V\]/) exit; print }" CHANGELOG.md \
            | head -n -1 > release-notes.md || true
          if [ ! -s release-notes.md ]; then
            echo "Release v$V" > release-notes.md
          fi
          {
            echo ""
            echo "---"
            echo ""
            echo "### Verification"
            echo ""
            echo '```'
            cat release-artifacts/SHA256SUMS.txt
            echo '```'
            echo ""
            echo "Verify the APK is genuine before installing:"
            echo '```bash'
            echo "sha256sum zupt-v$V.apk  # compare to SHA256SUMS.txt above"
            echo "apksigner verify --print-certs zupt-v$V.apk"
            echo '```'
          } >> release-notes.md
          cat release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Zupt ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: |
            release-artifacts/zupt-v${{ steps.version.outputs.version }}.apk
            release-artifacts/zupt-v${{ steps.version.outputs.version }}.aab
            release-artifacts/SHA256SUMS.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
