name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Assemble release (unsigned)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-home-cache-cleanup: true

      - name: Cache Gradle wrapper
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Decode debug keystore
        # CI builds use a deterministic debug keystore so APKs are installable for testing.
        # Production releases are signed by release.yml using GitHub Secrets.
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Lint
        run: ./gradlew :app:lintRelease --no-daemon
        continue-on-error: true

      - name: Assemble release APK
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Bundle release AAB
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Compute SHA-256 fingerprints
        run: |
          cd app/build/outputs
          sha256sum apk/release/*.apk bundle/release/*.aab > sha256sums.txt
          cat sha256sums.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zupt-apk-unsigned-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: zupt-aab-unsigned-${{ github.sha }}
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: sha256sums-${{ github.sha }}
          path: app/build/outputs/sha256sums.txt
